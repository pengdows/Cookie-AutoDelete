name: Auto Build

on:
  push:
    branches-ignore:
      - '_archived__**'
  pull_request:
    branches-ignore:
      - '_archived__**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js LTS 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install dependencies
        run: npm ci --no-fund
      - name: Run Build
        run: npm run build
        env:
          GITSHA: ${{ github.sha }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds
          path: builds
