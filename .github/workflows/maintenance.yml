name: Maintenance

on:
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  dependency-update:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        
      - name: Check outdated packages
        run: |
          echo "=== Outdated packages ===" 
          npm outdated || true
          echo "=== Dependency tree ===" 
          npm ls --depth=0 || true
          
      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Security vulnerabilities found in dependencies';
            const body = `
            ## Security Alert
            
            The weekly security scan found vulnerabilities in the project dependencies.
            
            **Action Required:**
            - Review the npm audit output in the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Update vulnerable packages using \`npm audit fix\` or manual updates
            - Test the application after updates
            - Close this issue once resolved
            
            **Workflow:** ${{ github.workflow }}
            **Run ID:** ${{ github.run_id }}
            **Triggered:** ${{ github.event_name }}
            `;
            
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependencies'
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies', 'maintenance']
              });
            }

  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build and analyze bundle
        run: |
          npm run build
          echo "=== Bundle sizes ===" 
          find extension -name "*.bundle.js" -exec ls -lh {} \;
          
          # Check if webpack-bundle-analyzer is available
          if npm list --depth=0 webpack-bundle-analyzer > /dev/null 2>&1; then
            echo "=== Bundle analysis available ==="
            # Could add bundle analysis here if needed
          fi
          
      - name: Check build output
        run: |
          echo "=== Extension structure ===" 
          du -sh extension/
          find extension -type f -name "*.js" -o -name "*.css" | head -20